name: MLOps Pipeline

on:
  push:
    branches: [main, bonus]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc AWS, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        # TODO 2: Set bien moi truong AWS de xac thuc voi S3.
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu S3 bang DVC.
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json va set thanh output.
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        # TODO 5: Upload models/model.pkl len s3://<bucket>/models/latest/model.pkl
        run: |
          python - <<'EOF'
          import boto3, os
          bucket = os.environ["CLOUD_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          print(f"Model uploaded to s3://{bucket}/models/latest/model.pkl")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Upload metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Authenticate to AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Check eval gate + rollback guard
        # Bonus 4: chi deploy khi accuracy moi >= accuracy cu (neu co).
        run: |
          python - <<'EOF'
          import boto3, json, os

          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")

          # Bonus 4: compare with previous model accuracy on S3
          bucket = os.environ.get("CLOUD_BUCKET", "")
          if bucket:
              try:
                  s3 = boto3.client("s3")
                  obj = s3.get_object(Bucket=bucket, Key="models/latest/metrics.json")
                  prev = json.loads(obj["Body"].read())
                  prev_acc = float(prev.get("accuracy", 0))
                  if acc < prev_acc:
                      raise SystemExit(f"ROLLBACK: new accuracy {acc:.4f} < previous {prev_acc:.4f}. Huy deploy.")
                  print(f"Rollback check passed: {acc:.4f} >= previous {prev_acc:.4f}")
              except s3.exceptions.NoSuchKey:
                  print("No previous metrics found, skipping rollback check.")
              except Exception as e:
                  print(f"Rollback check skipped: {e}")

          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: [eval, train]
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Download metrics artifact
        uses: actions/download-artifact@v4
        with:
          name: metrics
          path: outputs/

      - name: Authenticate to AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Save metrics to S3 for future rollback check
        run: |
          python - <<'EOF'
          import boto3, os
          bucket = os.environ["CLOUD_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("outputs/metrics.json", bucket, "models/latest/metrics.json")
          print(f"Metrics saved to s3://{bucket}/models/latest/metrics.json")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 7: Restart service mlops-serve tren VM.
            sudo systemctl restart mlops-serve
            # TODO 8: Cho server san sang roi goi curl /health de xac nhan.
            for i in $(seq 1 12); do
              curl -sf http://localhost:8002/health && echo "Health check passed." && exit 0
              echo "Waiting for server... ($i/12)"
              sleep 5
            done
            echo "Health check failed after 60s." && exit 1
